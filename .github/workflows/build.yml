name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      seadrive_version: ${{ steps.v.outputs.seadrive_version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          echo "version=$(awk -F'"' '/version \?/{print $2; exit}' nix/lib.nix)" >> "$GITHUB_OUTPUT"
          echo "seadrive_version=$(awk -F'"' '/seadriveVersion \?/{print $2; exit}' nix/lib.nix)" >> "$GITHUB_OUTPUT"

  appimage:
    needs: version
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.version.outputs.version }}
      SEADRIVE_VERSION: ${{ needs.version.outputs.seadrive_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Build Seafile AppImage
        run: nix build .#packages.${{ matrix.system }}.seafile-appimage
      - run: |
          cp result "seafile-${VERSION}-${{ matrix.arch }}.AppImage"
          sha256sum "seafile-${VERSION}-${{ matrix.arch }}.AppImage" > "seafile-${VERSION}-${{ matrix.arch }}.AppImage.sha256"
      - name: Build SeaDrive AppImage
        run: nix build .#packages.${{ matrix.system }}.seadrive-appimage
      - run: |
          cp result "seadrive-${SEADRIVE_VERSION}-${{ matrix.arch }}.AppImage"
          sha256sum "seadrive-${SEADRIVE_VERSION}-${{ matrix.arch }}.AppImage" > "seadrive-${SEADRIVE_VERSION}-${{ matrix.arch }}.AppImage.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ matrix.arch }}
          path: |
            seafile-${{ env.VERSION }}-${{ matrix.arch }}.AppImage
            seafile-${{ env.VERSION }}-${{ matrix.arch }}.AppImage.sha256
            seadrive-${{ env.SEADRIVE_VERSION }}-${{ matrix.arch }}.AppImage
            seadrive-${{ env.SEADRIVE_VERSION }}-${{ matrix.arch }}.AppImage.sha256

  # Builds the aarch64 macOS installer on an M-series runner.
  aarch64-pkg:
    needs: version
    runs-on: macos-latest  # aarch64-darwin (M-series)
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#packages.aarch64-darwin.seafile-pkg-aarch64
      - run: |
          cp result "seafile-${VERSION}-aarch64.pkg"
          shasum -a 256 "seafile-${VERSION}-aarch64.pkg" > "seafile-${VERSION}-aarch64.pkg.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: aarch64-pkg
          path: |
            seafile-${{ env.VERSION }}-aarch64.pkg
            seafile-${{ env.VERSION }}-aarch64.pkg.sha256

  release:
    needs: [version, appimage, aarch64-pkg]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Create or update release
        run: |
          printf 'Built from commit ${{ github.sha }}\n\n' > notes.md
          printf '## Checksums\n```\n' >> notes.md
          cat dist/*.sha256 >> notes.md
          printf '```\n' >> notes.md

          if gh release view "$VERSION" &>/dev/null; then
            gh release edit "$VERSION" --notes-file notes.md
            gh release upload "$VERSION" dist/*.AppImage dist/*.pkg dist/*.sha256 --clobber
          else
            gh release create "$VERSION" --title "$VERSION" --notes-file notes.md \
              dist/*.AppImage dist/*.pkg dist/*.sha256
          fi
